    <!-- Structured Data: FAQ Page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es BienCuidar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Una plataforma que conecta familias con enfermeras profesionales verificadas en El Salvador. Nosotros verificamos las credenciales CSSP, tú eliges a la enfermera."
          }
        },
        {
          "@type": "Question",
          "name": "¿Las enfermeras están verificadas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Verificamos el registro CSSP de cada enfermera ante el portal oficial del Ministerio de Salud. Nadie cuida a tu ser querido sin pasar por nuestra verificación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta usar BienCuidar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Publicar tu necesidad de cuidado es gratis. La tarifa la define cada enfermera según su especialidad y experiencia. Tú ves el precio antes de aceptar cualquier oferta."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funciona BienCuidar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Publicas la necesidad de cuidado (condición, fechas, ubicación), las enfermeras verificadas te envían ofertas con su tarifa, y tú eliges la que prefieras."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué tipo de cuidados puedo solicitar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Geriatría, postoperatorio, cuidados paliativos, heridas crónicas, sondaje, oxígeno permanente, acompañamiento y más. Cualquier necesidad de cuidado en casa."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué parte de El Salvador funciona?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En todo el país. Publicas con tu ubicación y las enfermeras deciden si les queda cerca para ofrecer sus servicios."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito tener CSSP para registrarme como enfermera?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. El registro CSSP es obligatorio por ley. Nosotros lo verificamos para que las familias confíen en ti."
          }
        },
        {
          "@type": "Question",
          "name": "¿Tengo que pagar para registrarme como enfermera?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. El registro es gratis. BienCuidar cobra una pequeña comisión por gestión solo cuando hay factura."
          }
        }
      ]
    }
    </script>
