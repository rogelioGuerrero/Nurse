[build]
  command = "npm run build"
  publish = "dist"

# TODO: Remove these hardcoded env vars after confirming Netlify UI variables work
[build.environment]
  VITE_SUPABASE_URL = "https://zqgtkrqfyhcvgagjhbnv.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_eY-iBKIqUVxMf_OAEa0CKg_DTxfCzpp"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self' https:; connect-src 'self' https: wss:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
